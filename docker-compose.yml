x-app-common: &app-common
  image: opsledger-app:local
  build:
    context: .
    dockerfile: docker/Dockerfile
  restart: unless-stopped
  environment:
    APP_NAME: ${APP_NAME}
    APP_ENV: ${APP_ENV}
    APP_VERSION: ${APP_VERSION}
    DATABASE_URL: ${DATABASE_URL}
  expose:
    - "8000"
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - opsledger_net
  healthcheck:
    test:
      [
        "CMD",
        "python",
        "-c",
        "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=3)"
      ]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 15s

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - opsledger_postgres_data:/var/lib/postgresql/data
    networks:
      - opsledger_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app_blue:
    <<: *app-common

  app_green:
    <<: *app-common

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      app_blue:
        condition: service_healthy
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/conf.d/includes/active_proxy_pass.conf:/etc/nginx/conf.d/includes/active_proxy_pass.conf:ro
    networks:
      - opsledger_net
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  jenkins-controller:
    build:
      context: .
      dockerfile: jenkins/controller/Dockerfile
    restart: unless-stopped
    environment:
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
    ports:
      - "${JENKINS_HTTP_PORT}:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - opsledger_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/login >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s

  jenkins-agent:
    build:
      context: .
      dockerfile: jenkins/agent/Dockerfile
    profiles: ["jenkins-agent"]
    restart: unless-stopped
    user: root
    environment:
      JENKINS_URL: http://jenkins-controller:8080/
      JENKINS_AGENT_NAME: ${JENKINS_AGENT_NAME}
      JENKINS_SECRET: ${JENKINS_AGENT_SECRET}
      JENKINS_WEB_SOCKET: "true"
      JENKINS_AGENT_WORKDIR: /home/jenkins/agent
      HOST_CI_ROOT: ${HOST_CI_ROOT}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_CI_ROOT}:${HOST_CI_ROOT}
      - jenkins_agent_workdir:/home/jenkins/agent
    depends_on:
      jenkins-controller:
        condition: service_healthy
    networks:
      - opsledger_net

networks:
  opsledger_net:
    driver: bridge

volumes:
  opsledger_postgres_data:
  jenkins_home:
  jenkins_agent_workdir: